<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="SportHub">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#18a558"/>
      <stop offset="1" stop-color="#0f7a3a"/>
    </linearGradient>
  </defs>

  <!-- Mark: rounded square + green slash + SH -->
  <rect x="24" y="24" width="208" height="208" rx="48" fill="#070a08"/>
  <path d="M60 188 L188 60" stroke="url(#g)" stroke-width="26" stroke-linecap="round" opacity="0.95"/>

  <g fill="#ffffff" font-family="Segoe UI, Inter, system-ui, -apple-system, sans-serif" font-weight="900">
    <text x="70" y="150" font-size="86" letter-spacing="-2">SH</text>
  </g>

  <!-- tiny gold dot accent -->
  <circle cx="196" cy="196" r="10" fill="#d4af37"/>
</svg>
